<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>加入旅行 - Treat All Trips</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#8b1a1a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <div class="auth-container">

    <!-- 載入中 -->
    <div id="join-loading" class="join-state">
      <div class="loading-spinner large"></div>
      <p>驗證邀請連結⋯</p>
    </div>

    <!-- 確認加入 -->
    <div id="join-confirm" class="auth-card" style="display:none;">
      <div class="join-trip-emoji" id="join-trip-emoji"></div>
      <h2 class="auth-card-title">您已受邀加入</h2>
      <div class="join-trip-info">
        <h3 id="join-trip-name" class="join-trip-name"></h3>
        <p id="join-trip-dest" class="join-trip-dest"></p>
        <p id="join-trip-dates" class="join-trip-dates"></p>
      </div>
      
      <!-- 未登入時顯示 -->
      <div id="join-need-auth" style="display:none;">
        <p class="auth-card-desc">請先登入以加入旅行</p>
        <div class="form-group">
          <label class="form-label">電子郵件</label>
          <input 
            type="email" 
            id="join-email" 
            class="form-input" 
            placeholder="your@email.com"
          />
        </div>
        <button id="join-send-magic-link" class="btn btn-primary btn-full">
          發送登入連結並加入旅行
        </button>
        <div id="join-auth-message" class="auth-message" style="display:none;"></div>
      </div>

      <!-- 已登入時顯示 -->
      <div id="join-logged-in" style="display:none;">
        <p class="auth-card-desc">點擊下方按鈕確認加入旅行</p>
        <button id="join-confirm-btn" class="btn btn-primary btn-full">
          確認加入旅行 🎉
        </button>
      </div>
    </div>

    <!-- 已是成員 -->
    <div id="join-already" class="auth-card" style="display:none;">
      <div class="auth-sent-icon">✅</div>
      <h2 class="auth-card-title">您已是旅行成員</h2>
      <p class="auth-card-desc" id="join-already-desc"></p>
      <button id="join-go-trip" class="btn btn-primary btn-full">
        前往旅行
      </button>
    </div>

    <!-- 錯誤狀態 -->
    <div id="join-error" class="auth-card" style="display:none;">
      <div class="auth-sent-icon">❌</div>
      <h2 class="auth-card-title">邀請連結無效</h2>
      <p class="auth-card-desc" id="join-error-desc">此邀請連結已過期或不存在</p>
      <button onclick="location.href='index.html'" class="btn btn-ghost btn-full">
        返回首頁
      </button>
    </div>

  </div>

  <script type="module" src="js/join.js"></script>
</body>
</html>
