<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理後台 - Treat All Trips</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6366f1" />
</head>
<body>

  <!-- 頂部導覽 -->
  <header class="top-bar">
    <div class="top-bar-inner">
      <h1 class="app-title">🛫 Treat All Trips</h1>
      <button id="logoutBtn" class="btn btn-ghost btn-sm">登出</button>
    </div>
  </header>

  <main class="admin-layout">

    <!-- 左側：建立旅行 -->
    <section class="card">
      <h2 class="section-title">➕ 建立新旅行</h2>

      <form id="createTripForm" class="form-stack">

        <!-- Emoji + 名稱 -->
        <div class="form-row">
          <div class="form-group" style="flex:0 0 80px">
            <label class="form-label">Emoji</label>
            <input type="text" id="tripEmoji" class="form-input"
              placeholder="✈️" maxlength="4" />
          </div>
          <div class="form-group" style="flex:1">
            <label class="form-label">旅行名稱 *</label>
            <input type="text" id="tripName" class="form-input"
              placeholder="例：日本自由行2025" required />
          </div>
        </div>

        <!-- 封面圖片上傳 -->
        <div class="form-group">
          <label class="form-label">封面圖片（選填）</label>
          <div class="cover-upload-area" id="coverUploadArea">
            <img id="coverPreview" class="cover-preview hidden" alt="封面預覽" />
            <div id="coverUploadPlaceholder" class="cover-upload-placeholder">
              <span class="cover-upload-icon">🖼️</span>
              <span>點擊上傳封面圖片</span>
              <span class="cover-upload-hint">建議尺寸 800×400，JPG/PNG</span>
            </div>
            <input type="file" id="coverImageInput" accept="image/*"
              class="cover-file-input" />
          </div>
          <button type="button" id="removeCoverBtn" class="btn btn-ghost btn-sm hidden" style="margin-top:4px">
            🗑️ 移除圖片
          </button>
        </div>

        <!-- 目的地 -->
        <div class="form-group">
          <label class="form-label">目的地</label>
          <input type="text" id="tripDestination" class="form-input"
            placeholder="例：東京、大阪" />
        </div>

        <!-- 日期 -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">出發日期</label>
            <input type="date" id="tripStartDate" class="form-input" />
          </div>
          <div class="form-group">
            <label class="form-label">回程日期</label>
            <input type="date" id="tripEndDate" class="form-input" />
          </div>
        </div>

        <!-- 基礎貨幣 -->
        <div class="form-group">
          <label class="form-label">基礎貨幣</label>
          <select id="tripCurrency" class="form-input">
            <option value="TWD">TWD 新台幣</option>
            <option value="JPY">JPY 日圓</option>
            <option value="USD">USD 美元</option>
            <option value="EUR">EUR 歐元</option>
            <option value="HKD">HKD 港幣</option>
            <option value="KRW">KRW 韓元</option>
            <option value="THB">THB 泰銖</option>
            <option value="SGD">SGD 新幣</option>
            <option value="GBP">GBP 英鎊</option>
            <option value="AUD">AUD 澳幣</option>
          </select>
        </div>

        <!-- 旅行說明 -->
        <div class="form-group">
          <label class="form-label">旅行說明</label>
          <textarea id="tripDescription" class="form-input form-textarea"
            placeholder="備註、說明..."></textarea>
        </div>

        <div id="createTripMessage" class="message hidden"></div>

        <button type="submit" id="createTripBtn" class="btn btn-primary btn-full">
          ✨ 建立旅行
        </button>

      </form>
    </section>

    <!-- 右側：旅行列表 -->
    <section class="card">
      <h2 class="section-title">🗺️ 我的旅行</h2>
      <div id="tripsList">
        <div class="loading-placeholder">載入中...</div>
      </div>
    </section>

  </main>

  <!-- 邀請 Modal -->
  <div id="inviteModal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title">🔗 邀請成員</h3>
        <button id="closeModal" class="btn-icon">✕</button>
      </div>

      <div class="form-stack">

        <div class="form-group">
          <label class="form-label">受邀者姓名（選填）</label>
          <input type="text" id="inviteeName" class="form-input"
            placeholder="例：小明" />
        </div>

        <div class="form-group">
          <label class="form-label">連結有效期限</label>
          <select id="inviteExpiry" class="form-input">
            <option value="24">24 小時</option>
            <option value="72">3 天</option>
            <option value="168">7 天</option>
            <option value="720">30 天</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">開放權限</label>
          <div class="permission-grid">
            <label class="perm-item">
              <input type="checkbox" id="perm_itinerary" checked />
              <span>📅 行程</span>
            </label>
            <label class="perm-item">
              <input type="checkbox" id="perm_expense" checked />
              <span>💰 費用</span>
            </label>
            <label class="perm-item">
              <input type="checkbox" id="perm_shopping" checked />
              <span>🛍️ 購物</span>
            </label>
            <label class="perm-item">
              <input type="checkbox" id="perm_info" checked />
              <span>ℹ️ 資訊</span>
            </label>
            <label class="perm-item">
              <input type="checkbox" id="perm_tools" checked />
              <span>🔧 工具</span>
            </label>
            <label class="perm-item">
              <input type="checkbox" id="perm_memo" checked />
              <span>📝 備忘</span>
            </label>
            <label class="perm-item">
              <input type="checkbox" id="perm_packing" checked />
              <span>🎒 行李</span>
            </label>
            <label class="perm-item">
              <input type="checkbox" id="perm_private_expense" />
              <span>🔒 私人帳</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">最大使用次數（0 = 不限）</label>
          <input type="number" id="inviteMaxUses" class="form-input"
            min="0" max="100" value="0" />
        </div>

        <button id="generateInviteBtn" class="btn btn-primary btn-full">
          🔗 生成邀請連結
        </button>

        <div id="inviteLinkResult" class="invite-result hidden">
          <p class="form-label">邀請連結：</p>
          <div class="invite-link-box">
            <span id="inviteLinkText" class="invite-link-text"></span>
          </div>
          <button id="copyInviteLink" class="btn btn-secondary btn-full">
            📋 複製連結
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- 成員管理 Modal -->
  <div id="membersModal" class="modal-overlay hidden">
    <div class="modal-box modal-box-wide">
      <div class="modal-header">
        <h3 class="modal-title">👥 成員管理</h3>
        <button id="closeMembersModal" class="btn-icon">✕</button>
      </div>
      <div id="membersList" class="members-list">
        <div class="loading-placeholder">載入中...</div>
      </div>
    </div>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
