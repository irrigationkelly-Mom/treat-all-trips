<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅遊 - Treat All Trips</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/trip.css" />
</head>
<body>

  <!-- ==========================================
       Loading Mask
  =========================================== -->
  <div id="loading-mask" style="display:flex; position:fixed; inset:0;
       background:rgba(18,18,18,0.85); z-index:9999;
       align-items:center; justify-content:center; flex-direction:column; gap:12px;">
    <div class="spinner"></div>
    <p style="color:#e8d5b0; font-size:0.9rem;">載入中…</p>
  </div>

  <!-- ==========================================
       Unauth Screen
  =========================================== -->
  <div id="unauth-screen" class="hidden" style="
       display:flex; flex-direction:column; align-items:center;
       justify-content:center; min-height:100vh; gap:16px; padding:40px 20px;">
    <span style="font-size:3rem;">🔒</span>
    <h2 style="color:#e8d5b0;">無法存取此旅遊</h2>
    <p style="color:#8a8a8a; text-align:center;">
      您可能沒有權限，或此旅遊不存在。
    </p>
    <a href="index.html" class="btn-primary">返回首頁</a>
  </div>

  <!-- ==========================================
       Trip Screen
  =========================================== -->
  <div id="trip-screen" class="hidden">

    <!-- 封面 -->
    <div id="trip-cover" class="trip-cover">
      <div class="trip-cover-overlay">
        <button class="btn-back" onclick="history.back()">← 返回</button>

        <div class="trip-cover-info">
          <h1 id="trip-name" class="trip-title">旅遊名稱</h1>
          <p id="trip-destination" class="trip-destination"></p>
          <p id="trip-dates" class="trip-dates"></p>
        </div>

        <div class="trip-cover-actions">
          <button id="edit-trip-btn" class="btn-icon hidden"
                  onclick="openEditTrip()" title="編輯旅遊">✏️</button>
          <button id="invite-btn" class="btn-icon hidden"
                  onclick="openInviteModal()" title="邀請成員">👥</button>
        </div>
      </div>
    </div>

    <!-- 成員頭像列 -->
    <div class="members-bar">
      <div id="members-avatars" class="members-avatars"></div>
    </div>

    <!-- 頁籤列 -->
    <div class="tabs-container">
      <div class="tabs-scroll">
        <button class="tab-btn active" data-tab="itinerary">🗺️ 行程</button>
        <button class="tab-btn" data-tab="expenses">💴 支出</button>
        <button class="tab-btn" data-tab="shopping">🛍️ 購物</button>
        <button class="tab-btn" data-tab="packing">🎒 打包</button>
        <button class="tab-btn" data-tab="memos">📝 備忘</button>
        <button class="tab-btn" data-tab="info">ℹ️ 資訊</button>
      </div>
    </div>

    <!-- 頁籤內容區 -->
    <div class="tab-content">

      <!-- ── 行程表 ── -->
      <div id="tab-itinerary" class="tab-panel">
        <div class="panel-header">
          <h2 class="panel-title">行程安排</h2>
          <button id="add-day-btn" class="btn-primary hidden"
                  onclick="openAddDayModal()">+ 新增天</button>
        </div>
        <div id="itinerary-list" class="itinerary-list"></div>
      </div>

      <!-- ── 支出管理 ── -->
      <div id="tab-expenses" class="tab-panel hidden">
        <div class="panel-header">
          <h2 class="panel-title">支出管理</h2>
          <button id="add-expense-btn" class="btn-primary hidden"
                  onclick="openAddExpenseModal()">+ 新增支出</button>
        </div>

        <!-- 支出摘要卡 -->
        <div class="expense-summary-card">
          <div class="summary-item">
            <span class="summary-label">總支出</span>
            <span id="total-amount" class="summary-value">¥0</span>
          </div>
          <div class="summary-divider"></div>
          <div class="summary-item">
            <span class="summary-label">每人均攤</span>
            <span id="per-person-amount" class="summary-value">¥0</span>
          </div>
          <div class="summary-divider"></div>
          <div class="summary-item">
            <button class="btn-settlement" onclick="openSettlementModal()">
              🧮 結算
            </button>
          </div>
        </div>

        <div id="expenses-list" class="expenses-list"></div>
      </div>

      <!-- ── 購物清單 ── -->
      <div id="tab-shopping" class="tab-panel hidden">
        <div class="panel-header">
          <h2 class="panel-title">購物清單</h2>
          <button id="add-shopping-btn" class="btn-primary hidden"
                  onclick="openAddShoppingModal()">+ 新增</button>
        </div>
        <div id="shopping-list" class="shopping-list"></div>
      </div>

      <!-- ── 打包清單 ── -->
      <div id="tab-packing" class="tab-panel hidden">
        <div class="panel-header">
          <h2 class="panel-title">打包清單</h2>
          <button id="add-packing-btn" class="btn-primary hidden"
                  onclick="openAddPackingModal()">+ 新增</button>
        </div>

        <!-- 打包進度條 -->
        <div id="packing-progress" class="packing-progress hidden">
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill" style="width:0%"></div>
          </div>
          <span id="progress-text" class="progress-text">0 / 0</span>
        </div>

        <div id="packing-list" class="packing-list"></div>
      </div>

      <!-- ── 備忘錄 ── -->
      <div id="tab-memos" class="tab-panel hidden">
        <div class="panel-header">
          <h2 class="panel-title">備忘錄</h2>
          <button id="add-memo-btn" class="btn-primary hidden"
                  onclick="openAddMemoModal()">+ 新增</button>
        </div>
        <div id="memos-list" class="memos-list"></div>
      </div>

      <!-- ── 旅遊資訊 ── -->
      <div id="tab-info" class="tab-panel hidden">
        <div class="panel-header">
          <h2 class="panel-title">旅遊資訊</h2>
          <button id="add-info-btn" class="btn-primary hidden"
                  onclick="openAddInfoModal()">+ 新增</button>
        </div>
        <div id="info-list" class="info-list"></div>
      </div>

    </div><!-- /tab-content -->
  </div><!-- /trip-screen -->


  <!-- ==========================================
       Modal 背景幕
  =========================================== -->
  <div id="modal-backdrop" class="modal-backdrop hidden"
       onclick="closeAllModals()"></div>


  <!-- ==========================================
       Modal：新增行程天
  =========================================== -->
  <div id="modal-add-day" class="modal hidden">
    <div class="modal-header">
      <h3>新增行程天</h3>
      <button class="modal-close" onclick="closeModal('modal-add-day')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>日期 <span class="required">*</span></label>
        <input type="date" id="day-date" class="form-input" />
      </div>
      <div class="form-group">
        <label>標題（選填）</label>
        <input type="text" id="day-title" class="form-input"
               placeholder="例：抵達東京" />
      </div>
      <div class="form-group">
        <label>備注（選填）</label>
        <textarea id="day-notes" class="form-textarea" rows="3"
                  placeholder="當天注意事項…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('modal-add-day')">取消</button>
      <button class="btn-primary" onclick="submitAddDay()">新增</button>
    </div>
  </div>


  <!-- ==========================================
       Modal：新增行程項目
  =========================================== -->
  <div id="modal-add-item" class="modal hidden">
    <input type="hidden" id="item-day-id" />
    <div class="modal-header">
      <h3>新增行程項目</h3>
      <button class="modal-close" onclick="closeModal('modal-add-item')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>名稱 <span class="required">*</span></label>
        <input type="text" id="item-title" class="form-input"
               placeholder="例：新幹線 東京→大阪" />
      </div>
      <div class="form-group">
        <label>類別</label>
        <select id="item-category" class="form-select">
          <option value="transport">🚄 交通</option>
          <option value="accommodation">🏨 住宿</option>
          <option value="food">🍜 餐飲</option>
          <option value="attraction">🎡 景點</option>
          <option value="shopping">🛍️ 購物</option>
          <option value="other">📌 其他</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group flex-1">
          <label>開始時間</label>
          <input type="time" id="item-start-time" class="form-input" />
        </div>
        <div class="form-group flex-1">
          <label>結束時間</label>
          <input type="time" id="item-end-time" class="form-input" />
        </div>
      </div>
      <div class="form-group">
        <label>地點</label>
        <input type="text" id="item-location" class="form-input"
               placeholder="例：東京車站" />
      </div>
      <div class="form-group">
        <label>預估費用</label>
        <input type="number" id="item-cost" class="form-input"
               placeholder="0" min="0" />
      </div>
      <div class="form-group">
        <label>訂位代碼</label>
        <input type="text" id="item-booking" class="form-input"
               placeholder="可選填" />
      </div>
      <div class="form-group">
        <label>備注</label>
        <textarea id="item-description" class="form-textarea" rows="2"
                  placeholder="其他說明…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('modal-add-item')">取消</button>
      <button class="btn-primary" onclick="submitAddItem()">新增</button>
    </div>
  </div>


  <!-- ==========================================
       Modal：新增支出
  =========================================== -->
  <div id="modal-add-expense" class="modal hidden">
    <div class="modal-header">
      <h3>新增支出</h3>
      <button class="modal-close" onclick="closeModal('modal-add-expense')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>名稱 <span class="required">*</span></label>
        <input type="text" id="expense-title" class="form-input"
               placeholder="例：晚餐拉麵" />
      </div>
      <div class="form-row">
        <div class="form-group flex-2">
          <label>金額 <span class="required">*</span></label>
          <input type="number" id="expense-amount" class="form-input"
                 placeholder="0" min="0" />
        </div>
        <div class="form-group flex-1">
          <label>幣別</label>
          <select id="expense-currency" class="form-select">
            <option value="JPY">JPY</option>
            <option value="TWD">TWD</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="KRW">KRW</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>類別</label>
        <select id="expense-category" class="form-select">
          <option value="food">🍜 餐飲</option>
          <option value="transport">🚄 交通</option>
          <option value="accommodation">🏨 住宿</option>
          <option value="shopping">🛍️ 購物</option>
          <option value="attraction">🎡 景點</option>
          <option value="other">📌 其他</option>
        </select>
      </div>
      <div class="form-group">
        <label>日期</label>
        <input type="date" id="expense-date" class="form-input" />
      </div>
      <div class="form-group">
        <label>由誰付款</label>
        <select id="expense-paid-by" class="form-select"></select>
      </div>
      <div class="form-group">
        <label>分帳方式</label>
        <div class="split-type-row">
          <label class="radio-label">
            <input type="radio" name="split-type" value="equal"
                   onchange="toggleSplitDetails('equal')" checked />
            平均分攤
          </label>
          <label class="radio-label">
            <input type="radio" name="split-type" value="custom"
                   onchange="toggleSplitDetails('custom')" />
            個別指定
          </label>
        </div>
        <div id="split-equal-info" class="split-info">
          將依成員人數平均分配
        </div>
        <div id="split-custom-detail" class="split-custom hidden"></div>
      </div>
      <div class="form-group">
        <label>備注</label>
        <textarea id="expense-notes" class="form-textarea" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('modal-add-expense')">取消</button>
      <button class="btn-primary" onclick="submitAddExpense()">新增</button>
    </div>
  </div>


  <!-- ==========================================
       Modal：結算
  =========================================== -->
  <div id="modal-settlement" class="modal hidden">
    <div class="modal-header">
      <h3>🧮 結算明細</h3>
      <button class="modal-close" onclick="closeModal('modal-settlement')">✕</button>
    </div>
    <div class="modal-body">
      <div id="settlement-content" class="settlement-content"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" onclick="closeModal('modal-settlement')">關閉</button>
    </div>
  </div>


  <!-- ==========================================
       Modal：新增購物項目
  =========================================== -->
  <div id="modal-add-shopping" class="modal hidden">
    <div class="modal-header">
      <h3>新增購物項目</h3>
      <button class="modal-close" onclick="closeModal('modal-add-shopping')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>名稱 <span class="required">*</span></label>
        <input type="text" id="shopping-name" class="form-input"
               placeholder="例：抹茶 KitKat" />
      </div>
      <div class="form-group">
        <label>店家</label>
        <input type="text" id="shopping-store" class="form-input"
               placeholder="例：唐吉訶德" />
      </div>
      <div class="form-row">
        <div class="form-group flex-2">
          <label>價格</label>
          <input type="number" id="shopping-price" class="form-input"
                 placeholder="0" min="0" />
        </div>
        <div class="form-group flex-1">
          <label>幣別</label>
          <select id="shopping-currency" class="form-select">
            <option value="JPY">JPY</option>
            <option value="TWD">TWD</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="KRW">KRW</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>數量</label>
        <input type="number" id="shopping-qty" class="form-input"
               value="1" min="1" />
      </div>
      <div class="form-group">
        <label>指定購買人</label>
        <select id="shopping-assigned" class="form-select"></select>
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="shopping-tax-refund" />
          可退稅商品 🧾
        </label>
      </div>
      <div class="form-group">
        <label>備注</label>
        <textarea id="shopping-notes" class="form-textarea" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('modal-add-shopping')">取消</button>
      <button class="btn-primary" onclick="submitAddShopping()">新增</button>
    </div>
  </div>


  <!-- ==========================================
       Modal：新增打包項目
  =========================================== -->
  <div id="modal-add-packing" class="modal hidden">
    <div class="modal-header">
      <h3>新增打包項目</h3>
      <button class="modal-close" onclick="closeModal('modal-add-packing')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>名稱 <span class="required">*</span></label>
        <input type="text" id="packing-name" class="form-input"
               placeholder="例：護照" />
      </div>
      <div class="form-group">
        <label>分類</label>
        <div class="form-row-gap">
          <select id="packing-category-id" class="form-select flex-1"></select>
          <button class="btn-secondary btn-small"
                  onclick="openAddPackingCategory()">+ 新增分類</button>
        </div>
      </div>
      <div class="form-group">
        <label>數量</label>
        <input type="number" id="packing-qty" class="form-input"
               value="1" min="1" />
      </div>
      <div class="form-group">
        <label>負責人</label>
        <select id="packing-assigned" class="form-select"></select>
      </div>
      <div class="form-group">
        <label>備注</label>
        <textarea id="packing-notes" class="form-textarea" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('modal-add-packing')">取消</button>
      <button class="btn-primary" onclick="submitAddPacking()">新增</button>
    </div>
  </div>


  <!-- ==========================================
       Modal：新增備忘錄
  =========================================== -->
  <div id="modal-add-memo" class="modal hidden">
    <div class="modal-header">
      <h3>新增備忘錄</h3>
      <button class="modal-close" onclick="closeModal('modal-add-memo')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>標題（選填）</label>
        <input type="text" id="memo-title" class="form-input"
               placeholder="例：重要提醒" />
      </div>
      <div class="form-group">
        <label>內容 <span class="required">*</span></label>
        <textarea id="memo-content" class="form-textarea" rows="5"
                  placeholder="寫下備忘內容…"></textarea>
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="memo-private" />
          設為私人（只有自己看得到）🔒
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('modal-add-memo')">取消</button>
      <button class="btn-primary" onclick="submitAddMemo()">新增</button>
    </div>
  </div>


  <!-- ==========================================
       Modal：新增旅遊資訊
  =========================================== -->
  <div id="modal-add-info" class="modal hidden">
    <div class="modal-header">
      <h3>新增旅遊資訊</h3>
      <button class="modal-close" onclick="closeModal('modal-add-info')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>標題 <span class="required">*</span></label>
        <input type="text" id="info-title" class="form-input"
               placeholder="例：機票訂位代碼" />
      </div>
      <div class="form-group">
        <label>類別</label>
        <select id="info-category" class="form-select">
          <option value="flight">✈️ 航班</option>
          <option value="hotel">🏨 飯店</option>
          <option value="visa">📄 簽證</option>
          <option value="insurance">🛡️ 保險</option>
          <option value="emergency">🆘 緊急聯絡</option>
          <option value="other">📌 其他</option>
        </select>
      </div>
      <div class="form-group">
        <label>內容 <span class="required">*</span></label>
        <textarea id="info-content" class="form-textarea" rows="4"
                  placeholder="例：航班號 CI123、確認碼 ABCDEF…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('modal-add-info')">取消</button>
      <button class="btn-primary" onclick="submitAddInfo()">新增</button>
    </div>
  </div>


  <!-- ==========================================
       Modal：邀請成員
  =========================================== -->
  <div id="modal-invite" class="modal hidden">
    <div class="modal-header">
      <h3>👥 邀請成員</h3>
      <button class="modal-close" onclick="closeModal('modal-invite')">✕</button>
    </div>
    <div class="modal-body">
      <p class="modal-desc">
        分享以下連結給旅伴，連結有效期 <strong>7 天</strong>，
        最多 <strong>50 人</strong>可使用。
      </p>
      <div class="invite-link-box">
        <input type="text" id="invite-link-input" class="form-input"
               readonly placeholder="尚未產生連結" />
        <button class="btn-secondary btn-small" onclick="copyInviteLink()">
          複製
        </button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('modal-invite')">關閉</button>
      <button class="btn-primary" onclick="generateInviteLink()">
        產生新連結
      </button>
    </div>
  </div>


  <!-- ==========================================
       Toast 通知
  =========================================== -->
  <div id="toast" class="toast hidden"></div>


  <script type="module" src="js/trip.js"></script>
</body>
</html>
