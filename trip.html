<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行程儀表板</title>

  <!-- PWA 相關（manifest.json 待補）-->
  <!-- <link rel="manifest" href="manifest.json" /> -->

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- 樣式 -->
  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* ===== 頂部行程資訊列 ===== */
    .trip-header {
      position: relative;
      width: 100%;
      height: 180px;
      background-color: #ccc;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end;
    }

    .trip-header-overlay {
      width: 100%;
      padding: 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
      color: white;
    }

    .trip-header-overlay h1 {
      margin: 0;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .trip-header-overlay p {
      margin: 4px 0 0;
      font-size: 0.85rem;
      opacity: 0.9;
    }

    /* ===== 狀態標籤 ===== */
    .trip-status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: bold;
      margin-left: 8px;
      vertical-align: middle;
    }
    .status-upcoming  { background: #e0f0ff; color: #0077cc; }
    .status-ongoing   { background: #e0ffe0; color: #007700; }
    .status-completed { background: #f0f0f0; color: #555555; }

    /* ===== 分頁導航 ===== */
    .tab-nav {
      display: flex;
      overflow-x: auto;
      background: #fff;
      border-bottom: 2px solid #eee;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .tab-nav button {
      flex: 1;
      min-width: 64px;
      padding: 12px 8px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.8rem;
      color: #888;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab-nav button:hover {
      color: #333;
      background: #f9f9f9;
    }

    .tab-nav button.active {
      color: #ff6b35;
      border-bottom: 3px solid #ff6b35;
      font-weight: bold;
    }

    .tab-nav button.hidden {
      display: none;
    }

    /* ===== 分頁內容 ===== */
    .tab-content {
      display: none;
      padding: 16px;
      min-height: 60vh;
    }

    .tab-content.active {
      display: block;
    }

    /* ===== 載入中 ===== */
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: #888;
      font-size: 1rem;
      gap: 12px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #eee;
      border-top-color: #ff6b35;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== 錯誤畫面 ===== */
    .error-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: #cc0000;
      font-size: 1rem;
      gap: 12px;
      text-align: center;
      padding: 24px;
    }
  </style>
</head>

<body>

  <!-- 載入中畫面 -->
  <div id="loadingScreen" class="loading-screen">
    <div class="spinner"></div>
    <p>載入行程中...</p>
  </div>

  <!-- 錯誤畫面 -->
  <div id="errorScreen" class="error-screen">
    <p id="errorMessage">發生錯誤，請稍後再試。</p>
    <button onclick="window.location.href='index.html'">返回首頁</button>
  </div>

  <!-- 主要內容（載入完成後顯示） -->
  <div id="mainContent" style="display:none;">

    <!-- 頂部行程封面與資訊 -->
    <div class="trip-header" id="tripHeader">
      <div class="trip-header-overlay">
        <h1>
          <span id="tripEmoji">✈️</span>
          <span id="tripName">行程名稱</span>
          <span id="tripStatusBadge" class="trip-status-badge"></span>
        </h1>
        <p id="tripDates">日期載入中...</p>
      </div>
    </div>

    <!-- 分頁導航列 -->
    <nav class="tab-nav" id="tabNav">
      <button id="tab-itinerary"  onclick="switchTab('itinerary')" >📅 行程</button>
      <button id="tab-expense"    onclick="switchTab('expense')"   >💰 費用</button>
      <button id="tab-shopping"   onclick="switchTab('shopping')"  >🛍️ 購物</button>
      <button id="tab-info"       onclick="switchTab('info')"      >ℹ️ 資訊</button>
      <button id="tab-tools"      onclick="switchTab('tools')"     >🔧 工具</button>
    </nav>

    <!-- 分頁內容區塊（Step B 填入） -->
    <div id="content-itinerary" class="tab-content"></div>
    <div id="content-expense"   class="tab-content"></div>
    <div id="content-shopping"  class="tab-content"></div>
    <div id="content-info"      class="tab-content"></div>
    <div id="content-tools"     class="tab-content"></div>

  </div>

  <!-- JS -->
  <script src="js/auth.js"></script>
  <script src="js/trip.js"></script>

</body>
</html>
