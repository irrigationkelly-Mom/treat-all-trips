<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treat All Trips</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- ① 全頁載入遮罩（必須在 body 最頂層） -->
  <div id="page-loading" class="page-loading" aria-hidden="true">
    <div class="page-loading-inner">
      <div class="loading-spinner"></div>
      <p class="loading-text">載入中⋯</p>
    </div>
  </div>

  <!-- ② 登入畫面 -->
  <div id="auth-screen" class="screen hidden">
    <div class="auth-container">
      <div class="auth-logo">
        <span class="auth-logo-emoji">✈️</span>
        <h1 class="auth-title">Treat All Trips</h1>
        <p class="auth-subtitle">規劃每一段旅程</p>
      </div>

      <!-- 輸入表單 -->
      <div id="magic-link-form" class="auth-form">
        <label for="auth-email" class="form-label">電子郵件</label>
        <input
          id="auth-email"
          type="email"
          class="form-input"
          placeholder="your@email.com"
          autocomplete="email"
        />
        <button id="send-magic-link-btn" class="btn btn-primary btn-block">
          發送登入連結
        </button>
        <p id="auth-message" class="auth-message hidden"></p>
      </div>

      <!-- 已發送提示 -->
      <div id="magic-link-sent" class="auth-sent hidden">
        <span class="auth-sent-icon">📬</span>
        <h2 class="auth-sent-title">登入連結已發送！</h2>
        <p class="auth-sent-desc">
          請檢查 <strong id="sent-email-display"></strong> 的收件匣
        </p>
        <button id="resend-btn" class="btn btn-ghost btn-block">
          重新輸入電子郵件
        </button>
      </div>
    </div>
  </div>

  <!-- ③ 主頁畫面 -->
  <div id="home-screen" class="screen hidden">

    <!-- 頂部導航 -->
    <header class="app-header">
      <div class="app-header-inner">
        <span class="app-logo">✈️ Treat All Trips</span>
        <div class="app-header-actions">
          <button id="admin-btn" class="btn btn-ghost btn-sm hidden">
            ⚙️ 管理後台
          </button>
          <span id="user-email-display" class="user-email"></span>
          <button id="logout-btn" class="btn btn-ghost btn-sm">登出</button>
        </div>
      </div>
    </header>

    <!-- 主要內容 -->
    <main class="home-main">
      <div class="home-header">
        <h2 class="home-title">我的旅行</h2>
      </div>

      <!-- 旅行列表區域 -->
      <div class="trips-container">

        <!-- 載入中 -->
        <div id="trips-loading" class="state-view">
          <div class="loading-spinner"></div>
          <p>載入旅行中⋯</p>
        </div>

        <!-- 空狀態 -->
        <div id="trips-empty" class="state-view hidden">
          <span class="state-icon">🗺️</span>
          <p class="state-title">還沒有旅行計畫</p>
          <p class="state-desc">等待旅行邀請，或聯絡管理員</p>
        </div>

        <!-- 旅行卡片列表 -->
        <div id="trips-list" class="trips-grid hidden"></div>

      </div>
    </main>

  </div><!-- /#home-screen -->

  <script type="module" src="js/home.js"></script>
</body>
</html>
