<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treat All Trips</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#667eea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body class="login-page">

  <div class="login-container">
    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon">✈️</div>
      <h1>Treat All Trips</h1>
      <p>你的旅行夥伴</p>
    </div>

    <!-- 登入卡片 -->
    <div class="login-card">
      <!-- Google 登入 -->
      <button id="btn-google-login" class="btn-google">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        使用 Google 帳號登入
      </button>

      <div class="divider"><span>或</span></div>

      <!-- Email 登入 -->
      <div id="email-login-form">
        <input 
          type="email" 
          id="input-email" 
          placeholder="電子郵件" 
          class="input-field"
          autocomplete="email"
        >
        <input 
          type="password" 
          id="input-password" 
          placeholder="密碼" 
          class="input-field"
          autocomplete="current-password"
        >
        <button id="btn-email-login" class="btn-primary">登入</button>
        <button id="btn-email-signup" class="btn-secondary">註冊新帳號</button>
      </div>

      <!-- 錯誤訊息 -->
      <div id="login-error" class="error-msg" style="display:none"></div>
      <!-- 載入中 -->
      <div id="login-loading" class="loading-spinner" style="display:none">
        <div class="spinner"></div>
        <span>登入中...</span>
      </div>
    </div>

    <!-- 我的行程列表（登入後顯示） -->
    <div id="my-trips-section" style="display:none">
      <h2 class="section-title">我的行程</h2>
      <div id="trips-list" class="trips-list">
        <!-- 動態載入 -->
      </div>
      <!-- Platform Admin 才看到 -->
      <div id="admin-section" style="display:none">
        <button id="btn-create-trip" class="btn-primary btn-full">
          ＋ 建立新行程
        </button>
        <a href="admin.html" class="btn-secondary btn-full text-center">
          管理後台
        </a>
      </div>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
